<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta  name="colgroup" discription="The colgroup element in HTML helps us to group the related columns especially to provide some common CSS property.">
    <title>colgroup tag</title>
</head>
<body>
    <table>
    <caption>MERN stack developer program</caption>
    <colgroup>
        <!-- The <colgroup> element in HTML helps us to group the related columns especially to provide some common CSS property. -->
        <!-- The <colgroup> element has an attribute "span" which carries the information regarding how many columns are to be grouped together. The default value of this span attribute is 1. -->
        <!-- 1 st column -->
        <col>
        <!-- 2 nd column  -->
        <col style="background-color:lightblue;">
         <!-- span 3 rd and 4 th columns -->
        <col span="2" style="background-color: lightgreen;">
        <!-- 4 th column -->
        <col style="background-color: lightpink;">
    </colgroup>
    <tr>
        <th>Technology</th>
        <td >MongoDB</td>
        <td >Node</td>
        <td >Express</td>
        <td>React</td>
    </tr>
    <tr>
        <th >Description</th>
        <td>The database</td>
        <td>Node is the base for server side scripting</td>
        <td>JS framework for web server development</td>
        <td>JS library to design the front end</td>
    </tr>
</table>
</body>
</html>
