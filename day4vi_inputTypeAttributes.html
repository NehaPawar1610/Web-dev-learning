<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Type Attribute</title>
</head>
<body>
    <form method="GET" action="">
         First name: <input type="text" placeholder="Enter your first name"/>  
        Username: <input type="text" pattern="[A-Z]+" required/>  
        Job experience: <input type="number" min="2" max="10" step="1"/> 
        Upload certificates:<input type="file" multiple/>
        <input type="submit" formmethod="POST">
    </form>

   
</body>
</html>
