<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Properties</title>
    <link rel="stylesheet" href="day9_PositionStyling.css">
</head>
<body>
    <section>
        <h3>Static div</h3>
        <div>S-Div1</div>
        <div id="static">S-Div2</div>
    </section>
    <section>
        <h3>Absolute div</h3>
        <div>A-Div1</div>
        <div id="absolute">A-Div2</div>
    </section>
    <section>
        <h3>Relative div</h3>
        <div>R-Div1</div>
        <div id="relative">R-Div2</div>
       
    </section>
     <section>
        <h3>Fixed div</h3>
        <div>F-Div1</div>
        <div id="fixed">F-Div2 scroll down the screen</div>
       
    </section>
</body>
</html>
